{{template "public_base" .}}

{{define "content"}}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">

      <div class="card shadow-sm">
        <div class="card-body p-4 text-center">

          {{if .success}}
          <div class="mb-4">
            <i class="bi bi-check-circle text-success" style="font-size: 4rem;"></i>
          </div>
          <h2 class="card-title mb-3 text-success">Xác nhận thành công!</h2>
          <p class="text-muted">Tài khoản của bạn đã được kích hoạt.</p>
          <div class="mt-4">
            <a href="/" class="btn btn-primary">
              <i class="bi bi-house me-1"></i>Về trang chủ
            </a>
          </div>

          {{else}}

          <div class="mb-4">
            <i class="bi bi-x-circle text-danger" style="font-size: 4rem;"></i>
          </div>
          <h2 class="card-title mb-3 text-danger">Xác nhận thất bại</h2>
          <p class="text-muted">{{.error}}</p>
          <div class="mt-4 d-flex gap-2 justify-content-center">
            <a href="/register" class="btn btn-primary">
              <i class="bi bi-person-plus me-1"></i>Đăng ký lại
            </a>
            <a href="/login" class="btn btn-outline-secondary">
              <i class="bi bi-box-arrow-in-right me-1"></i>Đăng nhập
            </a>
          </div>

          {{end}}

        </div>
      </div>

    </div>
  </div>
</div>
{{end}}
