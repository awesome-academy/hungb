{{if $.user}}
<form method="POST" action="/reviews/{{$.review.ID}}/comments" class="mb-4">
  <input type="hidden" name="_csrf" value="{{$.csrf_token}}" />
  <div class="mb-2">
    <textarea name="content" class="form-control" rows="3" placeholder="Viết bình luận..."></textarea>
  </div>
  <button type="submit" class="btn btn-sm btn-primary"><i class="bi bi-send me-1"></i>Gửi</button>
</form>
{{else}}
<p class="text-muted"><a href="/login">Đăng nhập</a> để bình luận.</p>
{{end}}
