# ============================================================
# COMPONENTS
# ============================================================
components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session-based authentication for public site users (requires login)
    adminSessionAuth:
      type: apiKey
      in: cookie
      name: session
      description: Session-based authentication for admin users (requires admin role)

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: Resource ID

  schemas:
    # ---- Auth Forms ----
    LoginForm:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          description: User email address
          example: user@example.com
        password:
          type: string
          format: password
          description: User password
          example: password123

    RegisterForm:
      type: object
      required: [full_name, email, password, password_confirm]
      properties:
        full_name:
          type: string
          minLength: 2
          description: Full name
          example: Nguyễn Văn A
        email:
          type: string
          format: email
          description: Email address
          example: user@example.com
        password:
          type: string
          format: password
          minLength: 8
          description: Password (minimum 8 characters)
        password_confirm:
          type: string
          format: password
          description: Password confirmation (must match password)

    # ---- Profile Forms ----
    ProfileUpdateForm:
      type: object
      required: [full_name]
      properties:
        full_name:
          type: string
          minLength: 2
          maxLength: 255
          description: Full name
          example: Nguyễn Văn A
        phone:
          type: string
          maxLength: 20
          description: Phone number
          example: "0901234567"
        avatar_url:
          type: string
          maxLength: 500
          description: Avatar image URL

    # ---- Bank Account Forms ----
    BankAccountForm:
      type: object
      required: [bank_name, account_number, account_holder]
      properties:
        bank_name:
          type: string
          maxLength: 255
          description: Bank name
          example: Vietcombank
        account_number:
          type: string
          maxLength: 50
          description: Account number
          example: "1234567890"
        account_holder:
          type: string
          maxLength: 255
          description: Account holder name
          example: NGUYEN VAN A

    # ---- Booking Forms ----
    BookingCreateForm:
      type: object
      required: [schedule_id, num_participants]
      properties:
        schedule_id:
          type: integer
          description: Tour schedule ID
        num_participants:
          type: integer
          minimum: 1
          description: Number of participants
        note:
          type: string
          description: Optional note for the booking

    # ---- Rating Forms ----
    RatingForm:
      type: object
      required: [score]
      properties:
        score:
          type: integer
          minimum: 1
          maximum: 5
          description: Rating score (1-5)
        comment:
          type: string
          description: Optional rating comment

    # ---- Review Forms ----
    ReviewForm:
      type: object
      required: [title, content, type]
      properties:
        title:
          type: string
          description: Review title
        content:
          type: string
          description: Review content
        type:
          type: string
          enum: [place, food, news]
          description: Review type
        images:
          type: string
          description: Image URLs (comma-separated or multi-value)

    # ---- Category Forms ----
    CategoryForm:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 255
          description: Category name
          example: Du lịch biển
        description:
          type: string
          description: Category description
        parent_id:
          type: integer
          description: Parent category ID (for subcategories)

    # ---- Tour Forms ----
    TourForm:
      type: object
      required: [title, price, duration_days, max_participants, status]
      properties:
        title:
          type: string
          maxLength: 500
          description: Tour title
          example: Tour Đà Nẵng - Hội An 3N2Đ
        description:
          type: string
          description: Tour description (HTML or plain text)
        price:
          type: number
          format: float
          minimum: 0
          exclusiveMinimum: true
          description: Base price (VND)
          example: 2500000
        duration_days:
          type: integer
          minimum: 1
          description: Tour duration in days
          example: 3
        location:
          type: string
          maxLength: 500
          description: Tour location
          example: Đà Nẵng - Hội An
        max_participants:
          type: integer
          minimum: 1
          description: Maximum number of participants
          example: 30
        status:
          type: string
          enum: [draft, active, inactive]
          description: Tour status
        category_ids:
          type: array
          items:
            type: integer
          description: Category IDs
        image_urls:
          type: array
          items:
            type: string
          description: Image URLs for the tour

    # ---- Schedule Forms ----
    ScheduleForm:
      type: object
      required: [departure_date, return_date, available_slots, status]
      properties:
        departure_date:
          type: string
          format: date
          description: Departure date (YYYY-MM-DD)
          example: "2025-07-01"
        return_date:
          type: string
          format: date
          description: Return date (YYYY-MM-DD)
          example: "2025-07-03"
        available_slots:
          type: integer
          minimum: 1
          description: Number of available slots
          example: 30
        price_override:
          type: number
          format: float
          description: Override price for this schedule (optional)
        status:
          type: string
          enum: [open, full, cancelled]
          description: Schedule status

    # ---- Data Models ----
    User:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        full_name:
          type: string
        phone:
          type: string
        avatar_url:
          type: string
        role:
          type: string
          enum: [admin, user]
        status:
          type: string
          enum: [active, inactive, banned]
        email_verified:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Tour:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        duration_days:
          type: integer
        location:
          type: string
        max_participants:
          type: integer
        images:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [draft, active, inactive]
        avg_rating:
          type: number
          format: float
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        parent_id:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TourSchedule:
      type: object
      properties:
        id:
          type: integer
        tour_id:
          type: integer
        departure_date:
          type: string
          format: date-time
        return_date:
          type: string
          format: date-time
        available_slots:
          type: integer
        price_override:
          type: number
          format: float
          nullable: true
        status:
          type: string
          enum: [open, full, cancelled]
        created_at:
          type: string
          format: date-time

    Booking:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        tour_id:
          type: integer
        schedule_id:
          type: integer
        num_participants:
          type: integer
        total_price:
          type: number
          format: float
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        note:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Payment:
      type: object
      properties:
        id:
          type: integer
        booking_id:
          type: integer
        bank_account_id:
          type: integer
          nullable: true
        amount:
          type: number
          format: float
        payment_method:
          type: string
        transaction_id:
          type: string
        status:
          type: string
          enum: [pending, success, failed, refunded]
        paid_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    BankAccount:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        bank_name:
          type: string
        account_number:
          type: string
        account_holder:
          type: string
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Rating:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        tour_id:
          type: integer
        score:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Review:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        title:
          type: string
        content:
          type: string
        type:
          type: string
          enum: [place, food, news]
        status:
          type: string
          enum: [pending, approved, rejected]
        like_count:
          type: integer
        images:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Comment:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        review_id:
          type: integer
        parent_id:
          type: integer
          nullable: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SocialAccount:
      type: object
      properties:
        id:
          type: integer
        user_id:
          type: integer
        provider:
          type: string
          enum: [google, facebook, twitter]
        provider_id:
          type: string
        created_at:
          type: string
          format: date-time

    ReviewLike:
      type: object
      properties:
        user_id:
          type: integer
        review_id:
          type: integer
        created_at:
          type: string
          format: date-time
